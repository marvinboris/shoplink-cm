<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF4D00"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Icon container - rounded square -->
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#iconGrad)"/>

  <!-- Chain link icon - left link -->
  <rect x="18" y="48" width="38" height="22" rx="11" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Chain link icon - right link -->
  <rect x="64" y="48" width="38" height="22" rx="11" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Overlap mask to create chain effect -->
  <rect x="48" y="46" width="24" height="26" fill="url(#iconGrad)"/>
  <!-- Center connect bar -->
  <rect x="51" y="55" width="18" height="8" rx="4" fill="white"/>

  <!-- Small accent dot -->
  <circle cx="101" cy="17" r="9" fill="url(#dotGrad)"/>
  <circle cx="101" cy="17" r="5" fill="white" opacity="0.9"/>
</svg>
